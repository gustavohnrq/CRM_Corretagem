<style>
  :root{
    --bg:#0b1220;
    --card:#111a2e;
    --line:#223155;
    --text:#e7eefc;
    --muted:#a9b6d6;
    --accent:#4da3ff;
    --danger:#ff5c73;
    --ok:#37d67a;
  }
  *{ box-sizing:border-box; }
  body{
    margin:0; padding:18px;
    font-family: Arial, Helvetica, sans-serif;
    background: var(--bg);
    color: var(--text);
  }
  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:14px;
  }
  .title{ font-size:18px; font-weight:700; }
  .sub{ color:var(--muted); font-size:12px; }
  .grid{
    display:grid;
    grid-template-columns: 360px 1fr;
    gap:14px;
  }
  .card{
    background: var(--card);
    border:1px solid var(--line);
    border-radius: 14px;
    padding:14px;
    box-shadow: 0 8px 22px rgba(0,0,0,.25);
  }
  .card h3{ margin:0 0 10px 0; font-size:14px; }
  label{ display:block; font-size:12px; color:var(--muted); margin:10px 0 6px; }
  input, select, textarea{
    width:100%;
    padding:10px 10px;
    border-radius: 10px;
    border:1px solid var(--line);
    background:#0f1830;
    color: var(--text);
    outline:none;
  }
  textarea{ min-height: 92px; resize: vertical; }
  .row{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .btns{ display:flex; gap:10px; flex-wrap:wrap; margin-top:12px; }
  button{
    cursor:pointer;
    border:none;
    border-radius: 12px;
    padding:10px 12px;
    font-weight:700;
    color:#081022;
    background: var(--accent);
  }
  button.secondary{
    background: transparent;
    color: var(--text);
    border:1px solid var(--line);
  }
  button.danger{ background: var(--danger); color:#1a0b11; }
  button.ok{ background: var(--ok); color:#06140c; }

  .list{
    display:flex; flex-direction:column; gap:8px;
    max-height: 70vh;
    overflow:auto;
    padding-right:6px;
  }
  .item{
    border:1px solid var(--line);
    background:#0f1830;
    border-radius: 12px;
    padding:10px;
    cursor:pointer;
  }
  .item:hover{ border-color:#35508a; }
  .item b{ display:block; font-size:13px; margin-bottom:4px; }
  .item small{ color: var(--muted); }
  .hint{ color:var(--muted); font-size:12px; }
  .pill{
    display:inline-block;
    padding:4px 8px;
    border:1px solid var(--line);
    border-radius:999px;
    color: var(--muted);
    font-size:11px;
  }

  /* ✅ NOTA 0–10 (botões) */
  .scoreWrap{ margin-top:10px; }
  .scoreLabel{
    display:flex; align-items:center; justify-content:space-between;
    margin:10px 0 6px;
    color: var(--muted);
    font-size:12px;
  }
  .scoreGrid{
    display:grid;
    grid-template-columns: repeat(11, minmax(0,1fr));
    gap:6px;
  }
  .scoreBtn{
    padding:8px 0;
    border-radius:10px;
    border:1px solid var(--line);
    background:#0f1830;
    color: var(--text);
    font-weight:700;
  }
  .scoreBtn.active{
    background: var(--accent);
    color:#081022;
    border-color: transparent;
  }
</style>
