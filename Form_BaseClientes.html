          Dica: mantenha “Próximo Follow-up” sempre preenchido para rodar sua rotina Seg–Sáb.

    <script>
      const SHEET = "Base_Clientes";
      const IDCOL = "ID";
      let currentId = null;

      // -------- máscaras / validações BR --------
      function onlyDigits(s){ return String(s||"").replace(/\D/g,""); }

      function maskDDMMYYYY(input){
        if (!input) return;
        input.addEventListener("input", ()=>{
          const d = onlyDigits(input.value).slice(0,8);
          let out = "";
          out += d.slice(0,2);
          if (d.length > 2) out += "/" + d.slice(2,4);
          if (d.length > 4) out += "/" + d.slice(4,8);
          input.value = out;
        });
      }

      function maskDDMM(input){
        if (!input) return;
        input.addEventListener("input", ()=>{
          const d = onlyDigits(input.value).slice(0,4);
          let out = "";
          out += d.slice(0,2);
          if (d.length > 2) out += "/" + d.slice(2,4);
          input.value = out;
        });
      }

      function isValidDDMMYYYY(s){
        if (!/^\d{2}\/\d{2}\/\d{4}$/.test(s)) return false;
        const [dd,mm,yyyy] = s.split("/").map(Number);
        if (yyyy < 1900 || yyyy > 2100) return false;
        if (mm < 1 || mm > 12) return false;
        const dt = new Date(yyyy, mm-1, dd);
        return dt.getFullYear()===yyyy && (dt.getMonth()+1)===mm && dt.getDate()===dd;
      }

      function isValidDDMM(s){
        if (!/^\d{2}\/\d{2}$/.test(s)) return false;
        const [dd,mm] = s.split("/").map(Number);
        if (mm < 1 || mm > 12) return false;
        if (dd < 1 || dd > 31) return false;
        return true;
      }

      function validateDates(obj){
        const required = ["Data Primeiro Contato","Último Contato","Próximo Follow-up"];
        for (const k of required){
          const v = String(obj[k]||"").trim();
          if (!v) throw new Error(`Campo obrigatório: ${k}.`);
          if (!isValidDDMMYYYY(v)) throw new Error(`Data inválida em "${k}". Use DD/MM/AAAA.`);
        }
        const b = String(obj["Data de Aniversário"]||"").trim();
        if (b && !isValidDDMM(b)) throw new Error(`Data de Aniversário inválida. Use DD/MM.`);
      }

      // -------- datalists (presets + planilha) --------
      const PRESETS = {
        "Tipo": ["Comprador","Vendedor","Investidor"],
        "Origem": ["Indicação","Empresa","OLX","Zap","VivaReal","Porteiro","Placa","Instagram","Facebook","WhatsApp"],
        "Forma de Pagamento": ["Financiamento","À vista","FGTS","Consórcio","Permuta"],
        "Banco": ["Caixa","Banco do Brasil","Bradesco","Itaú","Santander","BRB"],
        "Prazo de Compra": ["Imediato","30 dias","60 dias","90 dias","3 meses","6 meses","12 meses"],
        "Perfil (Moradia/Investimento)": ["Moradia","Investimento","Ambos"],
        "Região de Interesse": ["Asa Norte","Asa Sul","Sudoeste","Noroeste","Lago Norte","Lago Sul","Octogonal"],
        "Tipo de Imóvel": ["Apartamento","Cobertura","Kitnet","Casa","Sala Comercial","Loft"],
        "Vaga": ["Não","Sim","1 vaga","2 vagas","3 vagas"],
        "Posição": ["Nascente","Poente","Vazado","Canto","Meio"],
        "Andar": ["Baixo","Médio","Alto"],
        "Status Atual": ["Ativo","Morno","Frio","Negociação","Proposta","Fechado","Perdido"],
        "Potencial de Indicação": ["Alto","Médio","Baixo"],
        "Tem Outro Imóvel?": ["Sim","Não"],
        "Motivo Perda": ["Preço","Localização","Condição do imóvel","Financiamento","Desistiu","Comprou com outro corretor","Sem resposta"]
      };

      const DL_BIND = [
        ["dlTipo","Tipo"],
        ["dlOrigem","Origem"],
        ["dlFormaPag","Forma de Pagamento"],
        ["dlBanco","Banco"],
        ["dlPrazo","Prazo de Compra"],
        ["dlPerfil","Perfil (Moradia/Investimento)"],
        ["dlRegiao","Região de Interesse"],
        ["dlTipoImovel","Tipo de Imóvel"],
        ["dlVaga","Vaga"],
        ["dlPosicao","Posição"],
        ["dlAndar","Andar"],
        ["dlStatus","Status Atual"],
        ["dlPotencial","Potencial de Indicação"],
        ["dlOutroImovel","Tem Outro Imóvel?"],
        ["dlMotivoPerda","Motivo Perda"]
      ];

      function fillDatalist(dlId, values){
        const dl = document.getElementById(dlId);
        if (!dl) return;
        dl.innerHTML = "";
        (values||[]).forEach(v=>{
          const opt = document.createElement("option");
          opt.value = v;
          dl.appendChild(opt);
        });
      }

      function mergeUnique(a,b){
        const set = new Set();
        (a||[]).forEach(x=>{ x=String(x||"").trim(); if(x) set.add(x); });
        (b||[]).forEach(x=>{ x=String(x||"").trim(); if(x) set.add(x); });
        return Array.from(set).sort((x,y)=>x.localeCompare(y));
      }

      function loadDatalists(){
        // presets imediatos
        DL_BIND.forEach(([dlId, col])=> fillDatalist(dlId, PRESETS[col] || []));

        // mescla com valores do Sheets
        const cols = DL_BIND.map(x=>x[1]);
        google.script.run
          .withSuccessHandler(function(map){
            DL_BIND.forEach(([dlId, col])=>{
              fillDatalist(dlId, mergeUnique(PRESETS[col] || [], (map && map[col]) ? map[col] : []));
            });
          })
          .withFailureHandler(function(err){
            console.log("Datalist error:", err);
          })
          .getDistinctValues(SHEET, cols);
      }

      function fillFilterDatalist(dlId, values){
        const dl = byId(dlId);
        if (!dl) return;
        dl.innerHTML = "";
        (values || []).forEach(v=>{
          const opt = document.createElement("option");
          opt.value = v;
          dl.appendChild(opt);
        });
      }

      function loadFilterOptions(){
        google.script.run
          .withSuccessHandler(function(map){
            fillFilterDatalist("dlFPrazoCompra", (map && map["Prazo de Compra"]) || []);
            fillFilterDatalist("dlFStatusAtual", (map && map["Status Atual"]) || []);
          })
          .withFailureHandler(function(err){
            console.log("Filter options error:", err);
          })
          .getDistinctValues(SHEET, ["Prazo de Compra", "Status Atual"]);
      }

      function currentFilters(){
        return {
          prazoCompra: String(byId("fPrazoCompra").value || "").trim(),
          statusAtual: String(byId("fStatusAtual").value || "").trim()
        };
      }

      function applyFilters(){ loadList(currentFilters()); }

      function clearFilters(){
        byId("fPrazoCompra").value = "";
        byId("fStatusAtual").value = "";
        loadList({});
      }

      function reloadAll(){
        loadFilterOptions();
        loadDatalists();
        loadList(currentFilters());
      }

      // ====== LISTA: aponta para BC_listForPanel_v2 / BC_getById_v2 ======
      function loadList(filters){
        google.script.run
          .withSuccessHandler(function(items){
            renderList("list", items, function(it){
              currentId = it.id;

              google.script.run
                .withSuccessHandler(function(obj){
                  if (!obj) return toast("Registro não encontrado.");
                  setFormFromObject("form", obj);
                })
                .withFailureHandler(function(err){
                  toast("Erro ao carregar: " + (err.message || err));
                })
                .BC_getById_v2(it.id);
            });
          })
          .withFailureHandler(function(err){
            toast("Erro ao atualizar lista: " + (err.message || err));
          })
          .BC_listForPanelFiltered_v1(filters || {});
      }

      function newRecord(){ currentId=null; clearForm("form"); }

      function save(){
        try{
          const obj = formToObject("form");

          // valida (datas obrigatórias)
          validateDates(obj);

          // salva via DataService (mantendo strings DD/MM/AAAA)
          google.script.run
            .withSuccessHandler(function(res){
              toast("Salvo: " + res.action + " (ID " + res.id + ")");
              currentId = res.id;
              loadList(currentFilters());
            })
            .withFailureHandler(function(err){
              toast("Erro ao salvar: " + (err.message || err));
            })
            .upsertById(SHEET, IDCOL, obj);

        } catch(e){
          toast(e.message || e);
        }
      }

      function remove(){
        const obj = formToObject("form");
        const id = (obj[IDCOL] || currentId || "").toString().trim();
        if (!id) return toast("Informe o ID para excluir.");
        if (!confirm("Excluir ID " + id + "?")) return;

        google.script.run
          .withSuccessHandler(function(res){
            toast(res.ok ? "Excluído." : ("Não excluído: " + res.message));
            newRecord(); loadList(currentFilters());
          })
          .withFailureHandler(function(err){
            toast("Erro ao excluir: " + (err.message || err));
          })
          .deleteById(SHEET, IDCOL, id);
      }

      // máscaras
      maskDDMMYYYY(document.getElementById("Data Primeiro Contato"));
      maskDDMMYYYY(document.getElementById("Último Contato"));
      maskDDMMYYYY(document.getElementById("Próximo Follow-up"));
      maskDDMM(document.getElementById("Data de Aniversário"));

      loadFilterOptions();
      loadDatalists();
      loadList({});
    </script>
  </body>
